<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPhase – Register</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card" style="max-width:520px">
        <h2>🥦 NutriPhase</h2>
        <p class="sub">Create your account</p>

        <div id="alert-box"></div>

        <div class="form-row">
            <div class="form-group">
                <label>SSN (User ID)</label>
                <input type="number" id="SSN" placeholder="e.g. 10001">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role" onchange="toggleRoleFields()">
                    <option value="patient">Patient</option>
                    <option value="nutritionist">Nutritionist</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Your full name">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <div class="form-row">
    <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="e.g. 25" min="1" max="120">
    </div>
  
</div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters">
        </div>

        <!-- Patient fields -->
        <div id="patient-fields">
            <div class="form-group">
                <label>Health Goal</label>
                <input type="text" id="goal" placeholder="e.g. Lose weight, Build muscle">
            </div>
        </div>

        <!-- Nutritionist fields -->
        <div id="nutritionist-fields" class="hidden">
            <div class="form-group">
                <label>Bio</label>
                <textarea id="bio" rows="2" placeholder="Short professional bio"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Experience (years)</label>
                    <input type="number" id="experience_years" placeholder="5">
                </div>
                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text" id="qualification" placeholder="e.g. MSc Nutrition">
                </div>
            </div>
        </div>

        <button class="btn btn-primary btn-block" onclick="doRegister()">Create Account</button>

        <p class="text-muted mt-4" style="text-align:center">
            Already have an account? <a href="login.html">Sign in</a>
        </p>
    </div>
</div>
<script src="../assets/js/app.js"></script>
<script>
    function toggleRoleFields() {
        const role = document.getElementById('role').value;
        document.getElementById('patient-fields').classList.toggle('hidden', role !== 'patient');
        document.getElementById('nutritionist-fields').classList.toggle('hidden', role !== 'nutritionist');
    }

    async function doRegister() {
        const role = document.getElementById('role').value;
       const body = {
    SSN:      document.getElementById('SSN').value,
    name:     document.getElementById('name').value,
    email:    document.getElementById('email').value,
    password: document.getElementById('password').value,
    gender:   document.getElementById('gender').value,
    age:      document.getElementById('age').value,
    role
};

        if (role === 'patient') {
            body.goal = document.getElementById('goal').value;
        } else {
            body.bio              = document.getElementById('bio').value;
            body.experience_years = document.getElementById('experience_years').value;
            body.qualification    = document.getElementById('qualification').value;
        }

        try {
            await api('auth.php?action=register', 'POST', body);
            showAlert('alert-box', 'Account created! Redirecting to login…', 'success');
            setTimeout(() => window.location.href = 'login.html', 1500);
        } catch (e) {
            showAlert('alert-box', e.message, 'error');
        }
    }
</script>
</body>
</html>
