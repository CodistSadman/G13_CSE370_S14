<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPhase – My Patients</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .patient-card {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border, #e5e7eb);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .patient-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px; font-weight: bold;
            flex-shrink: 0;
        }
        .patient-info { flex: 1; min-width: 160px; }
        .patient-info h3 { margin: 0 0 4px; font-size: 16px; }
        .patient-info small { color: #888; font-size: 12px; }
        .patient-stats { display: flex; gap: 20px; flex-wrap: wrap; }
        .pstat { text-align: center; }
        .pstat .val { font-size: 18px; font-weight: 700; color: #2e7d32; }
        .pstat .lbl { font-size: 11px; color: #888; margin-top: 2px; }
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 999;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fff; border-radius: 14px;
            width: 95%; max-width: 680px;
            max-height: 85vh; overflow-y: auto;
            padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }
        .modal-header h2 { margin: 0; font-size: 20px; }
        .close-btn {
            background: none; border: none; font-size: 22px;
            cursor: pointer; color: #888; line-height: 1;
        }
        .section-title {
            font-size: 13px; font-weight: 700; color: #666;
            text-transform: uppercase; letter-spacing: .5px;
            margin: 20px 0 10px;
        }
    </style>
</head>
<body>
<div class="layout">
    <div class="main-content">
        <div class="page-header">
            <h1>🧑‍🤝‍🧑 My Patients</h1>
            <p>Patients currently subscribed to you.</p>
        </div>

        <div id="alert-box"></div>
        <div id="patient-list"><p class="text-muted">Loading…</p></div>
    </div>
</div>

<!-- Patient Detail Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="modal-title">Patient Details</h2>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div id="modal-body">Loading…</div>
    </div>
</div>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
    requireLogin();
    requireRole('nutritionist');

    async function loadPatients() {
        const container = document.getElementById('patient-list');
        try {
            const list = await api('nutritionists.php?action=my_patients');
            if (!list.length) {
                container.innerHTML = '<p class="text-muted">No patients subscribed yet.</p>';
                return;
            }
            container.innerHTML = list.map(p => `
                <div class="patient-card">
                    <div class="patient-avatar">${p.name.charAt(0).toUpperCase()}</div>
                    <div class="patient-info">
                        <h3>${p.name}</h3>
                        <small>${p.email} &nbsp;·&nbsp; SSN: ${p.P_SSN}</small><br>
                        <small>Goal: ${p.goal || '—'} &nbsp;·&nbsp; ${p.gender || ''}</small><br>
                        <small>Subscribed: ${formatDate(p.start_date)} → ${formatDate(p.end_date)}</small>
                    </div>
                    <div class="patient-stats">
                        <div class="pstat">
                            <div class="val">${p.habit_count || 0}</div>
                            <div class="lbl">Habit Logs</div>
                        </div>
                        <div class="pstat">
                            <div class="val">${p.last_habit ? formatDate(p.last_habit) : '—'}</div>
                            <div class="lbl">Last Entry</div>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="viewPatient(${p.P_SSN}, '${p.name}')">
                        View Details
                    </button>
                </div>
            `).join('');
        } catch(e) {
            container.innerHTML = `<p class="text-muted">${e.message}</p>`;
        }
    }

    async function viewPatient(pSSN, name) {
        document.getElementById('modal-title').textContent = '👤 ' + name;
        document.getElementById('modal-body').innerHTML    = 'Loading…';
        document.getElementById('modal').classList.add('open');

        try {
            const [habits, metrics] = await Promise.all([
                api(`habits.php?p_ssn=${pSSN}`),
                api(`metrics.php?p_ssn=${pSSN}`)
            ]);

            let html = '';

            // Habit summary
            const avgCal   = habits.length ? Math.round(habits.reduce((s,h) => s + Number(h.calories),   0) / habits.length) : 0;
            const avgSleep = habits.length ? (habits.reduce((s,h)  => s + Number(h.sleep_hours), 0) / habits.length).toFixed(1) : 0;
            const avgSteps = habits.length ? Math.round(habits.reduce((s,h) => s + Number(h.step_count || 0), 0) / habits.length) : 0;

            html += `<div class="section-title">📊 Habit Averages</div>
            <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;">
                <div class="pstat"><div class="val">${avgCal}</div><div class="lbl">Avg Calories</div></div>
                <div class="pstat"><div class="val">${avgSleep}h</div><div class="lbl">Avg Sleep</div></div>
                <div class="pstat"><div class="val">${avgSteps.toLocaleString()}</div><div class="lbl">Avg Steps</div></div>
                <div class="pstat"><div class="val">${habits.length}</div><div class="lbl">Total Logs</div></div>
            </div>`;

            // Recent habits table
            html += `<div class="section-title">📋 Recent Habits</div>
            <div class="table-wrap"><table>
                <thead><tr><th>Date</th><th>Calories</th><th>Sleep</th><th>Steps</th></tr></thead>
                <tbody>${habits.slice(0,5).map(h => `
                    <tr>
                        <td>${formatDate(h.date)}</td>
                        <td>${h.calories} kcal</td>
                        <td>${h.sleep_hours} hrs</td>
                        <td>🚶 ${Number(h.step_count||0).toLocaleString()}</td>
                    </tr>`).join('') || '<tr><td colspan="4" class="text-muted">No habits logged.</td></tr>'}
                </tbody>
            </table></div>`;

            // Latest metrics
            if (metrics.length) {
                const m   = metrics[0];
                const bmi = m.height ? (m.weight / ((m.height/100)**2)).toFixed(1) : '—';
                const cat = bmi !== '—' ? bmiCategory(parseFloat(bmi)) : { label:'—', cls:'badge-blue' };
                html += `<div class="section-title">⚖️ Latest Body Metrics</div>
                <div style="display:flex;gap:20px;flex-wrap:wrap;">
                    <div class="pstat"><div class="val">${m.height} cm</div><div class="lbl">Height</div></div>
                    <div class="pstat"><div class="val">${m.weight} kg</div><div class="lbl">Weight</div></div>
                    <div class="pstat"><div class="val">${bmi}</div><div class="lbl">BMI</div></div>
                    <div class="pstat"><div class="val"><span class="badge ${cat.cls}">${cat.label}</span></div><div class="lbl">Status</div></div>
                </div>`;
            } else {
                html += `<div class="section-title">⚖️ Body Metrics</div><p class="text-muted">No metrics logged yet.</p>`;
            }

            document.getElementById('modal-body').innerHTML = html;
        } catch(e) {
            document.getElementById('modal-body').innerHTML = `<p class="text-muted">Error: ${e.message}</p>`;
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    // Close modal on backdrop click
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadPatients();
</script>
</body>
</html>
