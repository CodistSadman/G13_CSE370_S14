<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPhase – Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>🥦 NutriPhase</h2>
        <p class="sub">Sign in to your account</p>

        <div id="alert-box"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-block" onclick="doLogin()">Sign In</button>

        <p class="text-muted mt-4" style="text-align:center">
            Don't have an account? <a href="register.html">Register</a>
        </p>
    </div>
</div>
<script src="../assets/js/app.js"></script>
<script>
    // Redirect if already logged in
    if (getUser()) window.location.href = 'dashboard.html';

    async function doLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return showAlert('alert-box', 'Please fill all fields.', 'error');

        try {
            const res = await api('auth.php?action=login', 'POST', { email, password });
            setUser(res.user);
            window.location.href = 'dashboard.html';
        } catch (e) {
            showAlert('alert-box', e.message, 'error');
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
</script>
</body>
</html>
