<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPhase – Groups</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="layout">
    <div class="main-content">
        <div class="page-header">
            <h1>👥 Groups</h1>
            <p>Join health groups and connect with others.</p>
        </div>

        <div class="card">
            <div class="card-title">Create a Group</div>
            <div id="alert-box"></div>
            <div class="form-row">
                <div class="form-group">
                    <label>Group Name</label>
                    <input type="text" id="group-name" placeholder="e.g. Diabetics Support">
                </div>
                <div class="form-group">
                    <label>Access</label>
                    <select id="group-access">
                        <option value="public">Public</option>
                        <option value="private">Private</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="createGroup()">Create Group</button>
        </div>

        <div class="card">
            <div class="card-title">All Groups</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Group Name</th><th>Access</th><th>Action</th></tr></thead>
                    <tbody id="all-groups-table"><tr><td colspan="3" class="text-muted">Loading…</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-title">My Groups</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Group Name</th><th>Access</th><th>Action</th></tr></thead>
                    <tbody id="my-groups-table"><tr><td colspan="3" class="text-muted">Loading…</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
    requireLogin();
    requireRole('patient');

    async function loadAllGroups() {
        const tbody = document.getElementById('all-groups-table');
        try {
            const list = await api('groups.php?action=all');
            tbody.innerHTML = list.length ? list.map(g => `
                <tr>
                    <td><strong>${g.group_name}</strong></td>
                    <td><span class="badge ${g.access === 'public' ? 'badge-green' : 'badge-yellow'}">${g.access}</span></td>
                    <td><button class="btn btn-secondary btn-sm" onclick="joinGroup(${g.group_id})">Join</button></td>
                </tr>`).join('') : '<tr><td colspan="3" class="text-muted">No groups yet.</td></tr>';
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="3">${e.message}</td></tr>`;
        }
    }

    async function loadMyGroups() {
        const tbody = document.getElementById('my-groups-table');
        try {
            const list = await api('groups.php');
            tbody.innerHTML = list.length ? list.map(g => `
                <tr>
                    <td><strong>${g.group_name}</strong></td>
                    <td><span class="badge ${g.access === 'public' ? 'badge-green' : 'badge-yellow'}">${g.access}</span></td>
                    <td><button class="btn btn-danger btn-sm" onclick="leaveGroup(${g.group_id})">Leave</button></td>
                </tr>`).join('') : '<tr><td colspan="3" class="text-muted">You haven\'t joined any groups.</td></tr>';
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="3">${e.message}</td></tr>`;
        }
    }

    async function createGroup() {
        const name   = document.getElementById('group-name').value.trim();
        const access = document.getElementById('group-access').value;
        if (!name) return showAlert('alert-box', 'Enter a group name.', 'error');
        try {
            await api('groups.php?action=create', 'POST', { group_name: name, access });
            showAlert('alert-box', 'Group created!', 'success');
            document.getElementById('group-name').value = '';
            loadAllGroups(); loadMyGroups();
        } catch(e) { showAlert('alert-box', e.message, 'error'); }
    }

    async function joinGroup(id) {
        try {
            await api('groups.php?action=join', 'POST', { group_id: id });
            showAlert('alert-box', 'Joined group!', 'success');
            loadMyGroups();
        } catch(e) { showAlert('alert-box', e.message, 'error'); }
    }

    async function leaveGroup(id) {
        if (!confirm('Leave this group?')) return;
        try {
            await api(`groups.php?group_id=${id}`, 'DELETE');
            loadMyGroups();
        } catch(e) { alert(e.message); }
    }

    loadAllGroups();
    loadMyGroups();
</script>
</body>
</html>
