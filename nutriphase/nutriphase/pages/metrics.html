<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPhase – Body Metrics</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="layout">
    <div class="main-content">
        <div class="page-header">
            <h1>⚖️ Body Metrics</h1>
            <p>Track your height, weight and BMI over time.</p>
        </div>

        <div class="card">
            <div class="card-title">Log Metrics</div>
            <div id="alert-box"></div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>
                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" id="height" placeholder="e.g. 170" step="0.1">
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" placeholder="e.g. 65" step="0.1">
                </div>
            </div>
            <div id="bmi-preview" class="text-muted mt-2"></div>
            <button class="btn btn-primary mt-4" onclick="saveMetrics()">Save Metrics</button>
        </div>

        <div class="card">
            <div class="card-title">History</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Date</th><th>Height (cm)</th><th>Weight (kg)</th><th>BMI</th><th>Status</th></tr></thead>
                    <tbody id="metrics-table"><tr><td colspan="5" class="text-muted">Loading…</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
    requireLogin();
    requireRole('patient');
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    // Live BMI preview
    ['height','weight'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateBMIPreview);
    });
    function updateBMIPreview() {
        const h = parseFloat(document.getElementById('height').value);
        const w = parseFloat(document.getElementById('weight').value);
        const preview = document.getElementById('bmi-preview');
        if (h && w) {
            const bmi = (w / ((h/100)**2)).toFixed(1);
            const cat = bmiCategory(parseFloat(bmi));
            preview.innerHTML = `BMI: <strong>${bmi}</strong> — <span class="badge ${cat.cls}">${cat.label}</span>`;
        } else {
            preview.textContent = '';
        }
    }

    async function loadMetrics() {
        const tbody = document.getElementById('metrics-table');
        try {
            const metrics = await api('metrics.php');
            tbody.innerHTML = metrics.length ? metrics.map(m => {
                const bmi = m.height ? (m.weight / ((m.height/100)**2)).toFixed(1) : '—';
                const cat = bmi !== '—' ? bmiCategory(parseFloat(bmi)) : { label: '—', cls: 'badge-blue' };
                return `<tr>
                    <td>${formatDate(m.date)}</td>
                    <td>${m.height}</td>
                    <td>${m.weight}</td>
                    <td>${bmi}</td>
                    <td><span class="badge ${cat.cls}">${cat.label}</span></td>
                </tr>`;
            }).join('') : '<tr><td colspan="5" class="text-muted">No metrics yet.</td></tr>';
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-muted">${e.message}</td></tr>`;
        }
    }

    async function saveMetrics() {
        const body = {
            date:   document.getElementById('date').value,
            height: document.getElementById('height').value,
            weight: document.getElementById('weight').value,
        };
        if (!body.date || !body.height || !body.weight)
            return showAlert('alert-box', 'Please fill all fields.', 'error');
        try {
            await api('metrics.php', 'POST', body);
            showAlert('alert-box', 'Metrics saved!', 'success');
            loadMetrics();
        } catch(e) { showAlert('alert-box', e.message, 'error'); }
    }

    loadMetrics();
</script>
</body>
</html>
