<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPhase – My Balance</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="layout">
    <div class="main-content">
        <div class="page-header">
            <h1>💰 My Balance</h1>
            <p>Track your earnings from patient subscriptions.</p>
        </div>

        <div class="stat-grid" style="margin-bottom:24px;">
            <div class="stat-card">
                <div class="label">Total Earned</div>
                <div class="value" id="total-earned">—</div>
            </div>
            <div class="stat-card" style="border-color:#e74c3c;">
                <div class="label">Platform Fee (25%)</div>
                <div class="value" id="total-deducted">—</div>
            </div>
            <div class="stat-card" style="border-color:#27ae60;">
                <div class="label">Net Balance</div>
                <div class="value" id="net-balance">—</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📋 Transaction History</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Transaction ID</th>
                            <th>Patient SSN</th>
                            <th>Full Fee</th>
                            <th>Platform Cut (25%)</th>
                            <th>You Received (75%)</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="payment-table">
                        <tr><td colspan="6" class="text-muted">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
    requireLogin();
    requireRole('nutritionist');

    async function loadBalance() {
        const tbody = document.getElementById('payment-table');
        try {
            const list = await api('payments.php');

            let totalDeducted = 0;
            list.forEach(p => totalDeducted += parseInt(p.amount));
            const totalEarned   = Math.round(totalDeducted / 0.25); // full fee = deducted / 25%
            const netBalance    = totalEarned - totalDeducted;

            document.getElementById('total-earned').textContent   = totalEarned + ' BDT';
            document.getElementById('total-deducted').textContent = totalDeducted + ' BDT';
            document.getElementById('net-balance').textContent    = netBalance + ' BDT';

            tbody.innerHTML = list.length ? list.map(p => {
                const devCut  = parseInt(p.amount);
                const fullFee = Math.round(devCut / 0.25);
                const youGet  = fullFee - devCut;
                return `<tr>
                    <td>#${p.transaction_id}</td>
                    <td>${p.P_SSN || '—'}</td>
                    <td>${fullFee} BDT</td>
                    <td style="color:#e74c3c;">${devCut} BDT</td>
                    <td style="color:#27ae60;"><strong>${youGet} BDT</strong></td>
                    <td>${p.created_at ? formatDate(p.created_at) : '—'}</td>
                </tr>`;
            }).join('') : '<tr><td colspan="6" class="text-muted">No transactions yet.</td></tr>';

        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="6">${e.message}</td></tr>`;
        }
    }

    loadBalance();
</script>
</body>
</html>
